name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check convexity tests

      - name: Verify all 12 analyzers register
        run: |
          python -c "import convexity.analysis; from convexity.core.registry import get_analyzers; n=len(get_analyzers()); print('analyzers:', n); assert n == 12, n"

      - name: Test (pytest)
        run: pytest -q --maxfail=1

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t convexity:ci .
      - name: Smoke-test the container
        run: |
          docker run -d --name convexity-ci -p 8000:8000 convexity:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then echo "healthy"; break; fi
            sleep 2
          done
          curl -fsS http://localhost:8000/health
          docker rm -f convexity-ci
